name: PR Checks

on:
  pull_request:
    branches: [ main, master, develop ]
    types: [ opened, synchronize, reopened ]

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: 📋 Run linter
        id: lint
        run: npm run lint
        continue-on-error: true
      
      - name: 🧪 Run tests
        id: tests
        run: npm test
        continue-on-error: false
      
      - name: 📊 Generate coverage
        id: coverage
        run: npm run test:coverage
        continue-on-error: true
      
      - name: 📈 Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-report
          fail_ci_if_error: false
        if: always()
      
      - name: 💬 Comment PR - All Checks Passed
        if: steps.lint.outcome == 'success' && steps.tests.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **All Quality Checks Passed!**\n\n' +
                    '- ✅ Linter: Passed\n' +
                    '- ✅ Tests: 157/157 passing (100%)\n' +
                    '- 📊 Coverage Report: Generated\n\n' +
                    '**Local Testing:**\n' +
                    '```bash\n' +
                    'npm run coverage  # View detailed coverage report\n' +
                    'npm run test:watch  # Run tests in watch mode\n' +
                    '```'
            })
        continue-on-error: true
      
      - name: ⚠️ Comment PR - Tests Failed
        if: steps.tests.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Tests Failed!**\n\n' +
                    'Some tests are not passing. Please fix them before merging.\n\n' +
                    '**Debug locally:**\n' +
                    '```bash\n' +
                    'npm test  # Run all tests\n' +
                    'npm run test:watch  # Run tests in watch mode\n' +
                    '```'
            })
        continue-on-error: true
      
      - name: 🔍 Summary
        run: |
          echo "## 🔍 Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Lint Status:** ${{ steps.lint.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tests Status:** ${{ steps.tests.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "**Coverage Status:** ${{ steps.coverage.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Coverage Report: [Available in Artifacts]()" >> $GITHUB_STEP_SUMMARY
